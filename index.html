<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- ── GREETING ── -->
    <header class="greeting-section">
      <section class="greeting-inner">
        <p id="greeting-text" class="greeting-text">Good Morning!</p>
        <p id="current-datetime" class="datetime-text"></p>
      </section>
      <button id="settings-btn" class="settings-btn" title="Settings" aria-label="Open settings">⚙️</button>
    </header>

    <main class="dashboard">

      <!-- ── FOCUS TIMER ── -->
      <section class="card timer-card">
        <h2 class="card-title">🎯 Focus Timer</h2>
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-mode-row">
          <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
          <button class="mode-btn" data-mode="short" data-minutes="5">Short Break</button>
          <button class="mode-btn" data-mode="long"  data-minutes="15">Long Break</button>
        </div>
        <div class="timer-controls">
          <button id="timer-start" class="btn btn-primary">▶ Start</button>
          <button id="timer-stop"  class="btn btn-secondary">⏸ Pause</button>
          <button id="timer-reset" class="btn btn-secondary">↺ Reset</button>
        </div>
        <p id="timer-status" class="timer-status">Ready to focus!</p>
      </section>

      <!-- ── TO-DO LIST ── -->
      <section class="card todo-card">
        <h2 class="card-title">✅ To-Do List</h2>

        <div class="todo-input-row">
          <input
            type="text"
            id="todo-input"
            class="todo-input"
            placeholder="Add a new task…"
            maxlength="120"
          />
          <button id="todo-add" class="btn btn-primary">Add</button>
        </div>

        <div class="todo-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="done">Done</button>
        </div>

        <ul id="todo-list" class="todo-list"></ul>

        <div class="todo-footer">
          <span id="todo-count" class="todo-count">0 tasks left</span>
          <button id="todo-clear-done" class="btn-link">Clear done</button>
        </div>
      </section>

      <!-- ── QUICK LINKS ── -->
      <section class="card links-card">
        <h2 class="card-title">🔗 Quick Links</h2>

        <div class="links-input-row">
          <input
            type="text"
            id="link-name-input"
            class="link-input"
            placeholder="Label"
            maxlength="30"
          />
          <input
            type="url"
            id="link-url-input"
            class="link-input"
            placeholder="https://…"
          />
          <button id="link-add" class="btn btn-primary">Add</button>
        </div>

        <div id="links-grid" class="links-grid"></div>
      </section>

    </main>

    <!-- ── SETTINGS MODAL ── -->
    <div id="settings-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="modal">
        <h3 class="modal-title" id="settings-title">⚙️ Settings</h3>

        <!-- Theme -->
        <div class="settings-row">
          <label class="settings-label">Theme</label>
          <div class="theme-toggle-wrap">
            <span class="theme-label-left">🌙 Dark</span>
            <button id="theme-toggle" class="toggle-switch" role="switch" aria-checked="false" aria-label="Toggle light mode">
              <span class="toggle-thumb"></span>
            </button>
            <span class="theme-label-right">☀️ Light</span>
          </div>
        </div>

        <!-- Custom name -->
        <div class="settings-row">
          <label class="settings-label" for="name-input">Your Name</label>
          <input
            type="text"
            id="name-input"
            class="settings-input"
            placeholder="e.x. Joni"
            maxlength="30"
          />
        </div>

        <!-- Pomodoro duration -->
        <div class="settings-row">
          <label class="settings-label" for="pomodoro-input">Pomodoro Duration</label>
          <div class="pomodoro-input-wrap">
            <input
              type="number"
              id="pomodoro-input"
              class="settings-input settings-input--short"
              min="1"
              max="99"
              value="25"
            />
            <span class="settings-unit">min</span>
          </div>
        </div>

        <div class="modal-actions">
          <button id="settings-save" class="btn btn-primary">Save</button>
          <button id="settings-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <!-- ── EDIT TASK MODAL ── -->
    <div id="edit-modal" class="modal-overlay hidden">
      <div class="modal">
        <h3 class="modal-title">Edit Task</h3>
        <input type="text" id="edit-input" class="todo-input" maxlength="120" />
        <div class="modal-actions">
          <button id="edit-save" class="btn btn-primary">Save</button>
          <button id="edit-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
